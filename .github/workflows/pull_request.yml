name: PR

on:
  pull_request:
    types: [opened, reopened, synchronize]

permissions:
  contents: read

jobs:
  soundness:
    name: Soundness
    uses: swiftlang/github-workflows/.github/workflows/soundness.yml@main
    with:
      license_header_check_project_name: "Swift HTTP API Proposal"
      api_breakage_check_container_image: "swiftlang/swift:nightly-6.4.x-noble"
      format_check_container_image: "swiftlang/swift:nightly-6.4.x-noble"

  unit-tests:
    name: Unit tests
    uses: apple/swift-nio/.github/workflows/unit_tests.yml@main
    with:
      linux_nightly_next_arguments_override: "--explicit-target-dependency-import-check error -Xswiftc -require-explicit-sendable"
      linux_nightly_main_arguments_override: "--explicit-target-dependency-import-check error -Xswiftc -require-explicit-sendable"

  macos-tests:
    name: macOS tests
    uses: apple/swift-nio/.github/workflows/macos_tests.yml@main
    with:
      runner_pool: general
      build_scheme: HTTPAPIProposal-Package
      swift_6_1_enabled: false
      swift_6_2_enabled: false
      swift_6_3_enabled: false

  release-builds:
    name: Release builds
    uses: apple/swift-nio/.github/workflows/release_builds.yml@main
    with:
      linux_6_0_enabled: false
      linux_6_1_enabled: false
      linux_6_2_enabled: false
      linux_6_3_enabled: false
